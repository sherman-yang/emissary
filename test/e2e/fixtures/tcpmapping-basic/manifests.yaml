---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tcp-echo
  template:
    metadata:
      labels:
        app: tcp-echo
    spec:
      containers:
        - name: agnhost
          image: registry.k8s.io/e2e-test-images/agnhost:2.63.0
          args: ["serve-hostname", "--http=false", "--tcp", "--port=9376"]
          ports:
            - containerPort: 9376
              name: tcp
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: tcp-echo
spec:
  selector:
    app: tcp-echo
  ports:
    - name: tcp
      port: 9376
      targetPort: 9376
      protocol: TCP
---
apiVersion: getambassador.io/v3alpha1
kind: Listener
metadata:
  name: tcp-listener
spec:
  port: 6789
  protocol: TCP
  securityModel: INSECURE
  hostBinding:
    namespace:
      from: ALL
---
apiVersion: getambassador.io/v3alpha1
kind: TCPMapping
metadata:
  name: tcp-echo
spec:
  port: 6789
  service: tcp-echo:9376
